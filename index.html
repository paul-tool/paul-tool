<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAUL-TOOLS | OSINT Pro</title>
    <style>
        :root { --red: #ff4d4d; --bg: #0a0a0a; --card: #161616; --input: #000; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 800px; background: var(--card); border-radius: 10px; border: 1px solid #333; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 2px solid var(--red); }
        h1 { color: var(--red); margin: 0; letter-spacing: 4px; font-size: 1.8rem; }

        /* Système d'accordéon (Flèches) */
        .category { border-bottom: 1px solid #222; }
        .category-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; transition: 0.3s; }
        .category-header:hover { background: #222; }
        .category-header h3 { margin: 0; font-size: 1rem; color: var(--red); text-transform: uppercase; }
        .arrow { transition: transform 0.3s; }
        
        .category-content { display: none; padding: 20px; background: var(--card); grid-template-columns: 1fr 1fr; gap: 10px; }
        .active .category-content { display: grid; }
        .active .arrow { transform: rotate(180deg); }

        input { background: var(--input); border: 1px solid #444; color: #00ff00; padding: 10px; border-radius: 4px; outline: none; font-family: monospace; }
        input:focus { border-color: var(--red); }
        
        .actions { padding: 20px; display: flex; gap: 10px; background: #1a1a1a; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-search { background: var(--red); color: white; }
        .btn-clear { background: #444; color: #ccc; }

        #results { padding: 20px; display: none; background: #000; font-family: monospace; }
        .profile-card { border-left: 3px solid var(--red); padding: 10px; margin-bottom: 15px; background: #111; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>PAUL-TOOLS 🔍</h1>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>👤 Identité</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="nom_famille" placeholder="Nom de famille">
            <input type="text" id="prenom" placeholder="Prénom">
            <input type="text" id="nom_naissance" placeholder="Nom de naissance">
            <input type="text" id="nom_affichage" placeholder="Nom d'affichage">
            <input type="text" id="nom_utilisateur" placeholder="Nom d'utilisateur">
            <input type="text" id="date_naissance" placeholder="Date (JJ/MM/AAAA)">
            <input type="text" id="genre" placeholder="Genre (M/F)">
            <input type="text" id="civilite" placeholder="Civilité (M./Mme)">
        </div>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>📞 Contact</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="email" placeholder="Adresse Email">
            <input type="text" id="telephone" placeholder="Téléphone">
            <input type="text" id="mobile" placeholder="Mobile">
            <input type="text" id="adresse_ip" placeholder="Adresse IP">
        </div>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>📍 Adresse</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="adresse" placeholder="Rue et numéro">
            <input type="text" id="code_postal" placeholder="Code Postal">
            <input type="text" id="ville" placeholder="Ville">
            <input type="text" id="pays" placeholder="Pays (Ex: FR)">
        </div>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>🆔 Identifiants Uniques</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="nir" placeholder="Numéro Sécu (NIR)">
            <input type="text" id="iban" placeholder="IBAN">
            <input type="text" id="siren" placeholder="SIREN">
            <input type="text" id="siret" placeholder="SIRET">
        </div>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>🚗 Véhicule</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="immatriculation" placeholder="Plaque (AB-123-CD)">
            <input type="text" id="vin_plaque" placeholder="Numéro VIN">
            <input type="text" id="marque" placeholder="Marque">
            <input type="text" id="modele" placeholder="Modèle">
        </div>
    </div>

    <div class="category">
        <div class="category-header" onclick="toggleCat(this)">
            <h3>💼 Professionnel</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="category-content">
            <input type="text" id="societe" placeholder="Entreprise">
            <input type="text" id="profession" placeholder="Métier">
            <input type="text" id="fonction" placeholder="Poste occupé">
        </div>
    </div>

    <div class="actions">
        <button class="btn-clear" onclick="location.reload()">♻️ Reset</button>
        <button class="btn-search" onclick="lancer()">🚀 Lancer l'Analyse</button>
    </div>

    <div id="results"></div>
</div>

<script>
    // 1. UTILISE TON URL RENDER ICI (ne pas oublier le /search à la fin)
    const API_URL = "https://api-paul-tool.onrender.com/search";

    function resetForm() {
        document.getElementById('searchForm').reset();
        document.getElementById('results').style.display = 'none';
    }

    async function lancerRecherche() {
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        
        const fields = [
            'nom_famille', 'prenom', 'nom_affichage', 'email', 
            'telephone', 'ville', 'code_postal', 'societe', 'immatriculation'
        ];
        
        let payload = { flexible: true };
        let hasData = false;

        fields.forEach(field => {
            const val = document.getElementById(field).value.trim();
            if (val) {
                payload[field] = val;
                hasData = true;
            }
        });

        if (!hasData) {
            alert("Veuillez renseigner au moins une information !");
            return;
        }

        loader.style.display = 'block';
        resultsDiv.style.display = 'none';
        resultsDiv.innerHTML = '';

        try {
            // 2. ON APPELLE TON SERVEUR (plus besoin de la clé API ici, elle est dans app.py)
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                const results = data.data?.results || [];
                afficherResultats(results);
            } else {
                resultsDiv.innerHTML = `<p style="color:red">Erreur : ${data.message || 'Problème serveur'}</p>`;
                resultsDiv.style.display = 'block';
            }
        } catch (error) {
            resultsDiv.innerHTML = `<p style="color:red">Erreur de connexion : Vérifie que Render est bien allumé.</p>`;
            resultsDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    function afficherResultats(results) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';

        if (!results || results.length === 0) {
            resultsDiv.innerHTML = '<p>⚠️ Aucun résultat trouvé pour cette recherche.</p>';
            return;
        }

        resultsDiv.innerHTML = `<h3>✅ ${results.length} RÉSULTAT(S) :</h3>`;
        
        results.forEach((profil, i) => {
            let html = `<div class="profile-card">
                <strong>👤 PROFIL #${i + 1}</strong> (Confiance: ${profil._confidence || 'N/A'}%)<br><br>`;
            
            for (const [key, value] of Object.entries(profil)) {
                if (!key.startsWith('_')) {
                    const cleanKey = key.replace(/_/g, ' ').toUpperCase();
                    html += `<span style="color: #aaa">${cleanKey}:</span> ${value}<br>`;
                }
            }
            html += `</div>`;
            resultsDiv.innerHTML += html;
        });
    }
</script>

</body>
</html>
